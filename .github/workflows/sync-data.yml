name: Sync episode data

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync episodes from Google Sheet
        run: npm run sync
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_GID: "1738275523"
          MIN_EPISODES: "700"

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync episodes from Google Sheet"
          file_pattern: data/episodes.json
